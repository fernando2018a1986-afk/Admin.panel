<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>Admin Panel - UNILA App</title>
<style>
* { margin:0; padding:0; box-sizing:border-box; -webkit-tap-highlight-color: transparent; }
body { font-family: 'Segoe UI', sans-serif; background: #1a1a2e; color: #e0e0e0; min-height: 100vh; padding: 15px; overflow-x: hidden; }

/* Login Screen */
#loginScreen { position: fixed; inset: 0; background: #1a1a2e; display: flex; align-items: center; justify-content: center; z-index: 10000; }
.login-box { background: #16213e; padding: 30px; border-radius: 15px; width: 90%; max-width: 350px; text-align: center; border: 1px solid #1f3460; box-shadow: 0 10px 30px rgba(0,0,0,0.5); }
.login-box h2 { margin-bottom: 20px; color: #5b21b6; }
.login-box input { width: 100%; padding: 12px; margin-bottom: 15px; border-radius: 8px; border: 1px solid #334155; background: #0f172a; color: white; text-align: center; font-size: 16px; }
.login-box button { width: 100%; padding: 12px; background: #5b21b6; border: none; border-radius: 8px; color: white; font-weight: bold; cursor: pointer; }
.login-box button:hover { background: #7c3aed; }

/* Main UI */
.header { text-align: center; padding: 25px; background: linear-gradient(135deg, #5b21b6, #2563eb); border-radius: 12px; margin-bottom: 20px; box-shadow: 0 8px 30px rgba(91, 33, 182, 0.3); }
.header h1 { font-size: 22px; margin-bottom: 5px; }
.status-bar { display: flex; align-items: center; gap: 8px; justify-content: center; margin-top: 10px; font-size: 11px; }
.status-dot { width: 8px; height: 8px; border-radius: 50%; background: #22c55e; animation: pulse 2s infinite; }
.status-dot.disconnected { background: #ef4444; animation: none; }
@keyframes pulse { 0%,100% { opacity:1; } 50% { opacity:0.4; } }

.section { background: #16213e; border-radius: 12px; margin-bottom: 15px; overflow: hidden; border: 1px solid #1f3460; }
.section-header { display: flex; justify-content: space-between; align-items: center; padding: 15px 20px; background: #1f3460; cursor: pointer; -webkit-user-select: none; }
.section-header h3 { font-size: 14px; display: flex; align-items: center; gap: 8px; }
.section-body { padding: 15px; display: none; }
.section-body.open { display: block; }

.upload-area { background: rgba(255,255,255,0.05); border: 2px dashed #334155; border-radius: 8px; padding: 15px; text-align: center; margin-bottom: 15px; position: relative; }
.btn-upload { background: #3b82f6; color: white; border: none; padding: 12px 15px; border-radius: 8px; font-size: 13px; font-weight: 600; cursor: pointer; margin-bottom: 10px; width: 100%; }
.btn-upload:disabled { background: #475569; cursor: not-allowed; }

.form-group { margin-bottom: 15px; }
.form-group label { display: block; font-size: 12px; color: #94a3b8; margin-bottom: 6px; font-weight: bold; }
.form-group input, .form-group textarea { width: 100%; padding: 12px; border: 1px solid #334155; border-radius: 8px; background: #0f172a; color: #e0e0e0; font-size: 14px; font-family: inherit; }
.form-group textarea { min-height: 150px; resize: vertical; line-height: 1.5; }

.btn-save { width: 100%; padding: 15px; border: none; border-radius: 8px; background: linear-gradient(135deg, #22c55e, #16a34a); color: white; font-weight: bold; cursor: pointer; transition: 0.2s; font-size: 15px; }
.btn-save:active { transform: scale(0.96); opacity: 0.8; }
.btn-save:disabled { opacity: 0.6; cursor: not-allowed; }

.btn-action { padding: 8px 12px; border: none; border-radius: 6px; font-size: 12px; font-weight: 600; cursor: pointer; margin-right: 5px; }
.btn-edit { background: #3b82f6; color: white; }
.btn-delete { background: #ef4444; color: white; }
.btn-cancel { background: #6b7280; color: white; }

.toast { position: fixed; bottom: 20px; left: 50%; transform: translateX(-50%) translateY(100px); background: #22c55e; color: white; padding: 12px 24px; border-radius: 8px; font-weight: 600; z-index: 9999; transition: 0.3s; box-shadow: 0 5px 20px rgba(0,0,0,0.5); font-size: 13px; width: 80%; text-align: center; }
.toast.show { transform: translateX(-50%) translateY(0); }
.toast.error { background: #ef4444; }

/* Modal de confirmação */
.modal { display: none; position: fixed; inset: 0; background: rgba(0,0,0,0.8); align-items: center; justify-content: center; z-index: 20000; padding: 20px; }
.modal-content { background: #16213e; padding: 20px; border-radius: 12px; width: 100%; max-width: 300px; text-align: center; }
.modal-btns { display: flex; gap: 10px; margin-top: 20px; }
.modal-btns button { flex: 1; padding: 10px; border-radius: 6px; border: none; font-weight: bold; cursor: pointer; }
.btn-modal-cancel { background: #475569; color: white; }
.btn-modal-confirm { background: #ef4444; color: white; }

/* Data/Hora no canto inferior direito */
#dateTimeWidget { 
  position: fixed; 
  bottom: 20px; 
  right: 20px; 
  background: rgba(91, 33, 182, 0.9); 
  color: white; 
  padding: 12px 16px; 
  border-radius: 8px; 
  font-size: 12px; 
  z-index: 5000; 
  box-shadow: 0 4px 15px rgba(0,0,0,0.4); 
  font-weight: 600;
  text-align: right;
  line-height: 1.4;
}

#dateTimeWidget .time { font-size: 14px; font-weight: 700; }
#dateTimeWidget .date { font-size: 11px; opacity: 0.9; }

.news-card { background: rgba(30, 41, 59, 0.8); border-radius: 12px; padding: 15px; margin-bottom: 15px; border: 1px solid rgba(255,255,255,0.1); }
.news-card-header { display: flex; justify-content: space-between; align-items: start; margin-bottom: 10px; }
.news-card-title { color: #22c55e; font-size: 14px; font-weight: bold; margin: 0; }
.news-card-actions { display: flex; gap: 5px; flex-wrap: wrap; }
.news-card-image { width: 100%; max-height: 250px; object-fit: cover; border-radius: 8px; margin-bottom: 10px; }
.news-card-video { width: 100%; max-height: 300px; border-radius: 8px; margin-bottom: 10px; }
.news-card-content { color: #e0e0e0; font-size: 13px; line-height: 1.5; margin-bottom: 10px; }
.news-card-date { color: #94a3b8; font-size: 11px; text-align: right; }

.media-preview { display: flex; gap: 10px; margin-top: 10px; flex-wrap: wrap; align-items: center; }
.media-preview-item { position: relative; }
.media-preview-item img { max-width: 100px; max-height: 100px; border-radius: 8px; }
.media-preview-item video { max-width: 100px; max-height: 100px; border-radius: 8px; }
.media-preview-remove { position: absolute; top: -8px; right: -8px; background: #ef4444; color: white; border: none; border-radius: 50%; width: 24px; height: 24px; cursor: pointer; font-size: 14px; }

.upload-buttons-row { display: flex; gap: 10px; margin-bottom: 15px; }
.upload-buttons-row button { flex: 1; }
</style>

<script src="https://www.gstatic.com/firebasejs/10.12.2/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.12.2/firebase-firestore-compat.js"></script>
</head>
<body>

<div id="loginScreen">
  <div class="login-box">
    <h2>🔐 Admin Access</h2>
    <input type="password" id="adminPass" placeholder="Senha do Painel" autocomplete="current-password">
    <button onclick="checkLogin()">Entrar</button>
  </div>
</div>

<div id="adminContent" style="display:none;">
  <div class="header">
    <h1>🎛️ Painel Admin</h1>
    <p>Gerenciamento UNILA App</p>
    <div class="status-bar">
      <div id="statusDot" class="status-dot"></div>
      <span id="statusText">Sincronizado</span>
    </div>
  </div>

  <div id="sectionsArea"></div>

  <!-- Seção de Gerenciamento de Notícias -->
  <div id="newsManagerSection" class="section" style="display:none;">
    <div class="section-header" onclick="this.nextElementSibling.classList.toggle('open')">
      <h3>📰 Gerenciar Notícias</h3>
      <span>▼</span>
    </div>
    <div class="section-body">
      <h4 id="newsFormTitle">Adicionar Nova Notícia</h4>
      <div class="form-group">
        <label for="newsTitle">Título da Notícia</label>
        <input type="text" id="newsTitle" placeholder="Título">
      </div>
      <div class="form-group">
        <label for="newsContent">Conteúdo da Notícia</label>
        <textarea id="newsContent" placeholder="Escreva sua notícia aqui..."></textarea>
      </div>

      <!-- Upload de Imagem e Vídeo -->
      <div class="upload-buttons-row">
        <div style="flex: 1;">
          <input type="file" id="newsImageUpload" accept="image/*" style="display:none;">
          <button class="btn-upload" onclick="document.getElementById('newsImageUpload').click()">📷 Adicionar Imagem</button>
        </div>
        <div style="flex: 1;">
          <input type="file" id="newsVideoUpload" accept="video/*" style="display:none;">
          <button class="btn-upload" onclick="document.getElementById('newsVideoUpload').click()">🎥 Adicionar Vídeo</button>
        </div>
      </div>

      <!-- Preview de Mídia -->
      <div id="newsMediaPreview" class="media-preview" style="display: none;"></div>

      <div style="display: flex; gap: 10px;">
        <button class="btn-save" onclick="submitNews()" style="flex: 1;">Publicar Notícia</button>
        <button class="btn-cancel" onclick="cancelEditNews()" style="flex: 1; display: none;" id="btnCancelEdit">Cancelar Edição</button>
      </div>
      
      <h4 style="margin-top:30px; margin-bottom:15px;">Notícias Publicadas</h4>
      <div id="newsList"></div>
    </div>
  </div>
</div>

<!-- Modal de Confirmação para Excluir -->
<div id="confirmModal" class="modal">
  <div class="modal-content">
    <h3 style="margin-bottom:10px;" id="confirmTitle">Excluir Notícia?</h3>
    <p style="font-size:13px; color:#94a3b8;" id="confirmMessage">Tem certeza que deseja excluir esta notícia?</p>
    <div class="modal-btns">
      <button class="btn-modal-cancel" onclick="closeModal()">Cancelar</button>
      <button class="btn-modal-confirm" id="confirmDeleteBtn">Excluir</button>
    </div>
  </div>
</div>

<!-- Widget de Data/Hora -->
<div id="dateTimeWidget">
  <div class="time" id="timeDisplay">00:00:00</div>
  <div class="date" id="dateDisplay">00/00/0000</div>
</div>

<div id="toast" class="toast"></div>

<script>
// CONFIGURAÇÃO FIREBASE
const firebaseConfig = {
  apiKey: "AIzaSyDCm8jh-gz3T8OkOH2J6ls66t5QizcKwu8",
  authDomain: "app-unila.firebaseapp.com",
  projectId: "app-unila",
  storageBucket: "app-unila.firebasestorage.app",
  messagingSenderId: "574505875323",
  appId: "1:574505875323:web:fb885f0a2ae32b272fafde",
  measurementId: "G-FJT3X93608"
};

firebase.initializeApp(firebaseConfig);
const db = firebase.firestore();

// CONFIGURAÇÃO CLOUDINARY
const CLOUDINARY_CLOUD_NAME = 'dthnn5flq';
const CLOUDINARY_API_KEY = '444299785184934';
const CLOUDINARY_API_SECRET = '3dNWqkn-MH4p3wF75K_vgb1opVs';

const MASTER_PASS = "unila2026";

let newsImageFile = null;
let newsVideoFile = null;
let editingNewsId = null;
let editingNewsOldImagePublicId = null;
let editingNewsOldVideoPublicId = null;

// Atualizar data/hora automaticamente
function updateDateTime() {
  const now = new Date();
  const timeString = now.toLocaleTimeString('pt-BR', { hour12: false });
  const dateString = now.toLocaleDateString('pt-BR');
  
  document.getElementById('timeDisplay').textContent = timeString;
  document.getElementById('dateDisplay').textContent = dateString;
}

// Atualizar data/hora a cada segundo
setInterval(updateDateTime, 1000);
updateDateTime();

// Event listeners para upload de imagem
document.getElementById('newsImageUpload').addEventListener('change', function(event) {
  newsImageFile = event.target.files[0];
  updateMediaPreview();
});

// Event listeners para upload de vídeo
document.getElementById('newsVideoUpload').addEventListener('change', function(event) {
  newsVideoFile = event.target.files[0];
  updateMediaPreview();
});

function updateMediaPreview() {
  const previewContainer = document.getElementById('newsMediaPreview');
  previewContainer.innerHTML = '';
  previewContainer.style.display = 'none';

  if (newsImageFile || newsVideoFile) {
    previewContainer.style.display = 'flex';
  }

  if (newsImageFile) {
    const reader = new FileReader();
    reader.onload = function(e) {
      const item = document.createElement('div');
      item.className = 'media-preview-item';
      const img = document.createElement('img');
      img.src = e.target.result;
      const btn = document.createElement('button');
      btn.className = 'media-preview-remove';
      btn.textContent = '✕';
      btn.onclick = () => {
        newsImageFile = null;
        updateMediaPreview();
      };
      item.appendChild(img);
      item.appendChild(btn);
      previewContainer.appendChild(item);
    };
    reader.readAsDataURL(newsImageFile);
  }

  if (newsVideoFile) {
    const reader = new FileReader();
    reader.onload = function(e) {
      const item = document.createElement('div');
      item.className = 'media-preview-item';
      const video = document.createElement('video');
      video.src = e.target.result;
      video.style.maxWidth = '100px';
      video.style.maxHeight = '100px';
      video.style.borderRadius = '8px';
      const btn = document.createElement('button');
      btn.className = 'media-preview-remove';
      btn.textContent = '✕';
      btn.onclick = () => {
        newsVideoFile = null;
        updateMediaPreview();
      };
      item.appendChild(video);
      item.appendChild(btn);
      previewContainer.appendChild(item);
    };
    reader.readAsDataURL(newsVideoFile);
  }
}

async function uploadToCloudinary(file, resourceType = 'auto') {
  if (!file) return null;
  try {
    const timestamp = Math.round(new Date().getTime() / 1000);
    const signature = await generateSignature({ timestamp: timestamp }, CLOUDINARY_API_SECRET);
    const formData = new FormData();
    formData.append('file', file);
    formData.append('api_key', CLOUDINARY_API_KEY);
    formData.append('timestamp', timestamp);
    formData.append('signature', signature);
    formData.append('resource_type', resourceType);

    const response = await fetch(`https://api.cloudinary.com/v1_1/${CLOUDINARY_CLOUD_NAME}/auto/upload`, {
      method: 'POST',
      body: formData
    });
    const data = await response.json();
    if (data.secure_url) {
      return { url: data.secure_url, public_id: data.public_id };
    } else {
      throw new Error(data.error ? data.error.message : 'Erro no servidor Cloudinary');
    }
  } catch (e) {
    console.error('Erro no upload:', e);
    showToast(`❌ Erro ao enviar arquivo: ${e.message || 'Falha na conexão'}`, 'error');
    return null;
  }
}

async function deleteFromCloudinary(publicId) {
  try {
    const timestamp = Math.round(new Date().getTime() / 1000);
    const signature = await generateSignature({ 
      public_id: publicId, 
      timestamp: timestamp 
    }, CLOUDINARY_API_SECRET);

    const formData = new FormData();
    formData.append('public_id', publicId);
    formData.append('api_key', CLOUDINARY_API_KEY);
    formData.append('timestamp', timestamp);
    formData.append('signature', signature);

    const response = await fetch(`https://api.cloudinary.com/v1_1/${CLOUDINARY_CLOUD_NAME}/resources_by_ids`, {
      method: 'POST',
      body: formData
    });
    
    // Tentar deletar como imagem
    let deleteResponse = await fetch(`https://api.cloudinary.com/v1_1/${CLOUDINARY_CLOUD_NAME}/image/destroy`, {
      method: 'POST',
      body: formData
    });
    
    let data = await deleteResponse.json();
    if (data.result !== 'ok' && data.result !== 'not found') {
      // Tentar deletar como vídeo
      deleteResponse = await fetch(`https://api.cloudinary.com/v1_1/${CLOUDINARY_CLOUD_NAME}/video/destroy`, {
        method: 'POST',
        body: formData
      });
      data = await deleteResponse.json();
    }
    
    return data.result === 'ok' || data.result === 'not found';
  } catch (e) {
    console.error('Erro ao deletar do Cloudinary:', e);
    return false;
  }
}

async function submitNews() {
  const title = document.getElementById('newsTitle').value;
  const content = document.getElementById('newsContent').value;
  const saveBtn = document.querySelector('#newsManagerSection .btn-save');

  if (!title || !content) {
    showToast('Por favor, preencha o título e o conteúdo da notícia.', 'error');
    return;
  }

  saveBtn.textContent = editingNewsId ? '⏳ Atualizando...' : '⏳ Publicando...';
  saveBtn.disabled = true;

  try {
    let imageUrl = null;
    let imagePublicId = null;
    let videoUrl = null;
    let videoPublicId = null;

    // Processar imagem
    if (newsImageFile) {
      if (editingNewsOldImagePublicId) {
        await deleteFromCloudinary(editingNewsOldImagePublicId);
      }
      const uploadResult = await uploadToCloudinary(newsImageFile, 'image');
      if (uploadResult) {
        imageUrl = uploadResult.url;
        imagePublicId = uploadResult.public_id;
      } else {
        throw new Error('Falha ao enviar imagem.');
      }
    } else if (editingNewsId) {
      const doc = await db.collection('news').doc(editingNewsId).get();
      if (doc.exists) {
        imageUrl = doc.data().imageUrl;
        imagePublicId = doc.data().imagePublicId;
      }
    }

    // Processar vídeo
    if (newsVideoFile) {
      if (editingNewsOldVideoPublicId) {
        await deleteFromCloudinary(editingNewsOldVideoPublicId);
      }
      const uploadResult = await uploadToCloudinary(newsVideoFile, 'video');
      if (uploadResult) {
        videoUrl = uploadResult.url;
        videoPublicId = uploadResult.public_id;
      } else {
        throw new Error('Falha ao enviar vídeo.');
      }
    } else if (editingNewsId) {
      const doc = await db.collection('news').doc(editingNewsId).get();
      if (doc.exists) {
        videoUrl = doc.data().videoUrl;
        videoPublicId = doc.data().videoPublicId;
      }
    }

    const now = new Date();
    const newsItem = {
      title: title,
      content: content,
      imageUrl: imageUrl,
      imagePublicId: imagePublicId,
      videoUrl: videoUrl,
      videoPublicId: videoPublicId,
      timestamp: firebase.firestore.FieldValue.serverTimestamp(),
      createdAt: now.toISOString()
    };

    if (editingNewsId) {
      await db.collection('news').doc(editingNewsId).update(newsItem);
      showToast('✅ Notícia atualizada com sucesso!');
      cancelEditNews();
    } else {
      await db.collection('news').add(newsItem);
      showToast('✅ Notícia publicada com sucesso!');
    }
    
    document.getElementById('newsTitle').value = '';
    document.getElementById('newsContent').value = '';
    document.getElementById('newsImageUpload').value = '';
    document.getElementById('newsVideoUpload').value = '';
    newsImageFile = null;
    newsVideoFile = null;
    editingNewsId = null;
    editingNewsOldImagePublicId = null;
    editingNewsOldVideoPublicId = null;
    updateMediaPreview();
    loadNews();

  } catch (e) {
    console.error('Erro ao publicar notícia:', e);
    showToast(`❌ Erro ao publicar notícia: ${e.message || 'Falha na conexão'}`, 'error');
  } finally {
    saveBtn.textContent = 'Publicar Notícia';
    saveBtn.disabled = false;
  }
}

function editNews(newsId) {
  db.collection('news').doc(newsId).get().then(doc => {
    if (doc.exists) {
      const news = doc.data();
      document.getElementById('newsTitle').value = news.title;
      document.getElementById('newsContent').value = news.content;
      document.getElementById('newsFormTitle').textContent = '✏️ Editar Notícia';
      document.getElementById('btnCancelEdit').style.display = 'block';
      
      document.querySelector('#newsManagerSection .section-body').scrollIntoView({ behavior: 'smooth' });
      
      editingNewsId = newsId;
      editingNewsOldImagePublicId = news.imagePublicId || null;
      editingNewsOldVideoPublicId = news.videoPublicId || null;
      newsImageFile = null;
      newsVideoFile = null;

      // Mostrar preview de mídia existente
      const previewContainer = document.getElementById('newsMediaPreview');
      previewContainer.innerHTML = '';
      previewContainer.style.display = 'flex';

      if (news.imageUrl) {
        const item = document.createElement('div');
        item.className = 'media-preview-item';
        const img = document.createElement('img');
        img.src = news.imageUrl;
        const btn = document.createElement('button');
        btn.className = 'media-preview-remove';
        btn.textContent = '✕';
        btn.onclick = () => {
          editingNewsOldImagePublicId = null;
          item.remove();
        };
        item.appendChild(img);
        item.appendChild(btn);
        previewContainer.appendChild(item);
      }

      if (news.videoUrl) {
        const item = document.createElement('div');
        item.className = 'media-preview-item';
        const video = document.createElement('video');
        video.src = news.videoUrl;
        video.style.maxWidth = '100px';
        video.style.maxHeight = '100px';
        video.style.borderRadius = '8px';
        const btn = document.createElement('button');
        btn.className = 'media-preview-remove';
        btn.textContent = '✕';
        btn.onclick = () => {
          editingNewsOldVideoPublicId = null;
          item.remove();
        };
        item.appendChild(video);
        item.appendChild(btn);
        previewContainer.appendChild(item);
      }

      if (!news.imageUrl && !news.videoUrl) {
        previewContainer.style.display = 'none';
      }
    }
  });
}

function cancelEditNews() {
  editingNewsId = null;
  editingNewsOldImagePublicId = null;
  editingNewsOldVideoPublicId = null;
  newsImageFile = null;
  newsVideoFile = null;
  document.getElementById('newsTitle').value = '';
  document.getElementById('newsContent').value = '';
  document.getElementById('newsImageUpload').value = '';
  document.getElementById('newsVideoUpload').value = '';
  document.getElementById('newsFormTitle').textContent = 'Adicionar Nova Notícia';
  document.getElementById('btnCancelEdit').style.display = 'none';
  updateMediaPreview();
}

async function loadNews() {
  const newsListDiv = document.getElementById('newsList');
  newsListDiv.innerHTML = '<p style="text-align:center; padding:20px; font-size:13px; color:#94a3b8;">Carregando notícias...</p>';

  try {
    const snapshot = await db.collection('news').orderBy('timestamp', 'desc').get();
    let html = '';
    if (snapshot.empty) {
      html = '<p style="text-align:center; padding:20px; font-size:13px; color:#94a3b8;">Nenhuma notícia publicada ainda.</p>';
    } else {
      snapshot.forEach(doc => {
        const news = doc.data();
        const newsId = doc.id;
        const date = news.createdAt ? new Date(news.createdAt).toLocaleString('pt-BR') : 'Data indisponível';
        html += `
          <div class="news-card">
            <div class="news-card-header">
              <h3 class="news-card-title">${news.title}</h3>
              <div class="news-card-actions">
                <button class="btn-action btn-edit" onclick="editNews('${newsId}')" title="Editar Notícia">✏️ Editar</button>
                <button class="btn-action btn-delete" onclick="confirmDeleteNews('${newsId}', '${news.imagePublicId || ''}', '${news.videoPublicId || ''}')" title="Excluir Notícia">🗑️ Excluir</button>
              </div>
            </div>
            ${news.imageUrl ? `<img src="${news.imageUrl}" class="news-card-image" alt="Imagem da notícia">` : ''}
            ${news.videoUrl ? `<video class="news-card-video" controls><source src="${news.videoUrl}" type="video/mp4">Seu navegador não suporta vídeo.</video>` : ''}
            <p class="news-card-content">${news.content}</p>
            <p class="news-card-date">📅 ${date}</p>
          </div>
        `;
      });
    }
    newsListDiv.innerHTML = html;
  } catch (e) {
    console.error('Erro ao carregar notícias:', e);
    newsListDiv.innerHTML = '<p style="text-align:center; padding:20px; font-size:13px; color:#ef4444;">Erro ao carregar notícias.</p>';
  }
}

function confirmDeleteNews(newsId, imagePublicId, videoPublicId) {
  document.getElementById('confirmTitle').textContent = 'Excluir Notícia?';
  document.getElementById('confirmMessage').textContent = 'Tem certeza que deseja excluir esta notícia? Esta ação não pode ser desfeita.';
  showConfirmModal(async () => {
    await deleteNews(newsId, imagePublicId, videoPublicId);
  });
}

async function deleteNews(newsId, imagePublicId, videoPublicId) {
  showToast('⏳ Excluindo notícia...');
  try {
    if (imagePublicId) {
      await deleteFromCloudinary(imagePublicId);
    }
    if (videoPublicId) {
      await deleteFromCloudinary(videoPublicId);
    }
    await db.collection('news').doc(newsId).delete();
    showToast('🗑️ Notícia removida com sucesso!');
    loadNews();
  } catch (e) {
    console.error('Erro ao deletar notícia:', e);
    showToast(`❌ Erro ao excluir notícia: ${e.message || 'Falha na conexão'}`, 'error');
  }
  closeModal();
}

function showConfirmModal(callback) {
  const modal = document.getElementById('confirmModal');

  document.getElementById('confirmModal').style.display = 'none';

async function loadData() {
  const area = document.getElementById('sectionsArea');
  area.innerHTML = '<p style="text-align:center; padding:30px; font-size:14px; color:#94a3b8;">Sincronizando dados...</p>';

  let html = '';
  for (const btn of editableButtons) {
    let val = "";
    try {
      const doc = await db.collection('admin_content').doc(btn.id).get();
      if(doc.exists) {
        if (btn.id === 'noticias_manager') {
          continue; 
        } else {
          val = doc.data().value;
        }
      }
    } catch(e) {}

    html += `
      <div class="section">
        <div class="section-header" onclick="this.nextElementSibling.classList.toggle('open')">
          <h3>${btn.name}</h3>
          <span>▼</span>
        </div>
        <div class="section-body">
          <p style="font-size:11px; color:#94a3b8; margin-bottom:12px; font-style:italic;">${btn.description}</p>
          <div class="form-group">
            <label>${btn.type === 'link' ? 'Link (URL)' : 'Texto / HTML'}</label>
            ${btn.type === 'link' 
              ? `<input type="url" id="field_${btn.id}" value="${val}" placeholder="https://...">`
              : `<textarea id="field_${btn.id}" placeholder="Escreva o conteúdo...">${val}</textarea>`
            }
          </div>
          <button class="btn-save" onclick="saveField('${btn.id}')">💾 Salvar Alterações</button>
        </div>
      </div>
    `;
  }
  area.innerHTML = html;
}

async function saveField(id) {
  const field = document.getElementById(`field_${id}`);
  const val = field.value.trim();
  const btn = event ? (event.target.closest('.btn-save') || event.target) : null;
  const originalText = btn ? btn.textContent : "";
  if (btn && btn.classList.contains('btn-save')) {
    btn.textContent = "⏳ Salvando...";
    btn.disabled = true;
  }
  try {
    await db.collection('admin_content').doc(id).set({
      value: val,
      updatedAt: firebase.firestore.FieldValue.serverTimestamp()
    }, { merge: true });
    showToast("✅ Alterações salvas!");
    if (btn && btn.classList.contains('btn-save')) btn.textContent = "✅ Sucesso!";
  } catch(e) {
    showToast("❌ Erro ao salvar no Firebase.", "error");
    if (btn && btn.classList.contains('btn-save')) btn.textContent = "❌ Erro!";
  } finally {
    if (btn && btn.classList.contains('btn-save')) {
      setTimeout(() => {
        btn.textContent = originalText;
        btn.disabled = false;
      }, 2000);
    }
  }
}

function showToast(msg, type = 'success') {
  const t = document.getElementById('toast');
  t.textContent = msg;
  t.className = `toast show ${type === 'error' ? 'error' : ''}`;
  setTimeout(() => t.className = 'toast', 3000);
}

async function generateSignature(params, secret) {
  try {
    const sortedParams = Object.keys(params).sort().map(key => `${key}=${params[key]}`).join('&');
    const stringToSign = sortedParams + secret;
    if (window.crypto && window.crypto.subtle) {
      const encoder = new TextEncoder();
      const data = encoder.encode(stringToSign);
      const hashBuffer = await window.crypto.subtle.digest('SHA-1', data);
      const hashArray = Array.from(new Uint8Array(hashBuffer));
      return hashArray.map(b => b.toString(16).padStart(2, '0')).join('');
    }
  } catch (e) {
    console.error('Erro ao gerar assinatura:', e);
  }
  return '';
}
