<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>Admin Panel - UNILA App</title>
<style>
* { margin:0; padding:0; box-sizing:border-box; -webkit-tap-highlight-color: transparent; }
body { font-family: 'Segoe UI', sans-serif; background: #1a1a2e; color: #e0e0e0; min-height: 100vh; padding: 15px; overflow-x: hidden; }

/* Login Screen */
#loginScreen { position: fixed; inset: 0; background: #1a1a2e; display: flex; align-items: center; justify-content: center; z-index: 10000; }
.login-box { background: #16213e; padding: 30px; border-radius: 15px; width: 90%; max-width: 350px; text-align: center; border: 1px solid #1f3460; box-shadow: 0 10px 30px rgba(0,0,0,0.5); }
.login-box h2 { margin-bottom: 20px; color: #5b21b6; }
.login-box input { width: 100%; padding: 12px; margin-bottom: 15px; border-radius: 8px; border: 1px solid #334155; background: #0f172a; color: white; text-align: center; font-size: 16px; }
.login-box button { width: 100%; padding: 12px; background: #5b21b6; border: none; border-radius: 8px; color: white; font-weight: bold; cursor: pointer; }

/* Main UI */
.header { text-align: center; padding: 25px; background: linear-gradient(135deg, #5b21b6, #2563eb); border-radius: 12px; margin-bottom: 20px; box-shadow: 0 8px 30px rgba(91, 33, 182, 0.3); }
.header h1 { font-size: 22px; margin-bottom: 5px; }
.status-bar { display: flex; align-items: center; gap: 8px; justify-content: center; margin-top: 10px; font-size: 11px; }
.status-dot { width: 8px; height: 8px; border-radius: 50%; background: #22c55e; animation: pulse 2s infinite; }
.status-dot.disconnected { background: #ef4444; animation: none; }
@keyframes pulse { 0%,100% { opacity:1; } 50% { opacity:0.4; } }

.section { background: #16213e; border-radius: 12px; margin-bottom: 15px; overflow: hidden; border: 1px solid #1f3460; }
.section-header { display: flex; justify-content: space-between; align-items: center; padding: 15px 20px; background: #1f3460; cursor: pointer; -webkit-user-select: none; }
.section-header h3 { font-size: 14px; display: flex; align-items: center; gap: 8px; }
.section-body { padding: 15px; display: none; }
.section-body.open { display: block; }

.upload-area { background: rgba(255,255,255,0.05); border: 2px dashed #334155; border-radius: 8px; padding: 15px; text-align: center; margin-bottom: 15px; position: relative; }
.btn-upload { background: #3b82f6; color: white; border: none; padding: 12px 15px; border-radius: 8px; font-size: 13px; font-weight: 600; cursor: pointer; margin-bottom: 10px; width: 100%; }
.btn-upload:disabled { background: #475569; cursor: not-allowed; }

/* Galeria de Imagens */
.image-gallery { display: grid; grid-template-columns: repeat(auto-fill, minmax(80px, 1fr)); gap: 10px; margin-top: 10px; border-top: 1px solid #334155; padding-top: 10px; }
.gallery-item { position: relative; aspect-ratio: 1; border-radius: 6px; overflow: hidden; border: 1px solid #3b82f6; background: #0f172a; }
.gallery-img { width: 100%; height: 100%; object-fit: cover; }
.btn-del-gallery { position: absolute; top: 2px; right: 2px; background: rgba(239, 68, 68, 0.9); color: white; border: none; width: 18px; height: 18px; border-radius: 50%; cursor: pointer; font-size: 12px; display: flex; align-items: center; justify-content: center; }

.form-group { margin-bottom: 15px; }
.form-group label { display: block; font-size: 12px; color: #94a3b8; margin-bottom: 6px; font-weight: bold; }
.form-group input, .form-group textarea { width: 100%; padding: 12px; border: 1px solid #334155; border-radius: 8px; background: #0f172a; color: #e0e0e0; font-size: 14px; font-family: inherit; }
.form-group textarea { min-height: 150px; resize: vertical; line-height: 1.5; }

.btn-save { width: 100%; padding: 15px; border: none; border-radius: 8px; background: linear-gradient(135deg, #22c55e, #16a34a); color: white; font-weight: bold; cursor: pointer; transition: 0.2s; font-size: 15px; }
.btn-save:active { transform: scale(0.96); opacity: 0.8; }
.btn-save:disabled { opacity: 0.6; cursor: not-allowed; }

.toast { position: fixed; bottom: 20px; left: 50%; transform: translateX(-50%) translateY(100px); background: #22c55e; color: white; padding: 12px 24px; border-radius: 8px; font-weight: 600; z-index: 9999; transition: 0.3s; box-shadow: 0 5px 20px rgba(0,0,0,0.5); font-size: 13px; width: 80%; text-align: center; }
.toast.show { transform: translateX(-50%) translateY(0); }
.toast.error { background: #ef4444; }

.badge { padding: 3px 8px; border-radius: 4px; font-size: 10px; text-transform: uppercase; }
.badge-link { background: #2563eb; }
.badge-page { background: #9333ea; }

/* Modal de confirmação */
.modal { display: none; position: fixed; inset: 0; background: rgba(0,0,0,0.8); align-items: center; justify-content: center; z-index: 20000; padding: 20px; }
.modal-content { background: #16213e; padding: 20px; border-radius: 12px; width: 100%; max-width: 300px; text-align: center; }
.modal-btns { display: flex; gap: 10px; margin-top: 20px; }
.modal-btns button { flex: 1; padding: 10px; border-radius: 6px; border: none; font-weight: bold; cursor: pointer; }
.btn-cancel { background: #475569; color: white; }
.btn-confirm { background: #ef4444; color: white; }
</style>

<script src="https://www.gstatic.com/firebasejs/10.12.2/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.12.2/firebase-firestore-compat.js"></script>
</head>
<body>

<div id="loginScreen">
  <div class="login-box">
    <h2>🔐 Admin Access</h2>
    <input type="password" id="adminPass" placeholder="Senha do Painel" autocomplete="current-password">
    <button onclick="checkLogin()">Entrar</button>
  </div>
</div>

<div id="adminContent" style="display:none;">
  <div class="header">
    <h1>🎛️ Painel Admin</h1>
    <p>Gerenciamento UNILA App</p>
    <div class="status-bar">
      <div id="statusDot" class="status-dot"></div>
      <span id="statusText">Sincronizado</span>
    </div>
  </div>

  <div id="sectionsArea"></div>
</div>

<!-- Modal de Confirmação para Excluir -->
<div id="confirmModal" class="modal">
  <div class="modal-content">
    <h3 style="margin-bottom:10px;">Excluir Imagem?</h3>
    <p style="font-size:13px; color:#94a3b8;">Isso removerá a imagem do Cloudinary e do conteúdo.</p>
    <div class="modal-btns">
      <button class="btn-cancel" onclick="closeModal()">Cancelar</button>
      <button class="btn-confirm" id="confirmDeleteBtn">Excluir</button>
    </div>
  </div>
</div>

<div id="toast" class="toast"></div>

<script>
// CONFIGURAÇÃO FIREBASE
const firebaseConfig = {
  apiKey: "AIzaSyDCm8jh-gz3T8OkOH2J6ls66t5QizcKwu8",
  authDomain: "app-unila.firebaseapp.com",
  projectId: "app-unila",
  storageBucket: "app-unila.firebasestorage.app",
  messagingSenderId: "574505875323",
  appId: "1:574505875323:web:fb885f0a2ae32b272fafde",
  measurementId: "G-FJT3X93608"
};

firebase.initializeApp(firebaseConfig);
const db = firebase.firestore();

// CONFIGURAÇÃO CLOUDINARY
const CLOUDINARY_CLOUD_NAME = 'dthnn5flq';
const CLOUDINARY_API_KEY = '444299785184934';
const CLOUDINARY_API_SECRET = '3dNWqkn-MH4p3wF75K_vgb1opVs';

const MASTER_PASS = "unila2026";

function checkLogin() {
  const pass = document.getElementById('adminPass').value;
  if(pass === MASTER_PASS) {
    document.getElementById('loginScreen').style.display = 'none';
    document.getElementById('adminContent').style.display = 'block';
    loadData();
  } else {
    alert("Senha incorreta!");
  }
}

const editableButtons = [
  { id: "noticias", name: "📰 Notícias", type: "page", description: "Atualize as notícias principais" },
  { id: "portal_unila", name: "🌐 Portal UNILA", type: "link", description: "Link oficial" },
  { id: "sigaa", name: "📚 SIGAA", type: "link", description: "Sistema acadêmico" },
  { id: "email", name: "📧 E-mail Institucional", type: "link", description: "Link do e-mail" },
  { id: "google", name: "🔎 Pesquisa Google", type: "link", description: "Buscador" },
  { id: "instagram", name: "📸 Instagram UNILA", type: "link", description: "Rede social" },
  { id: "facebook", name: "📘 Facebook UNILA", type: "link", description: "Rede social" },
  { id: "biblioteca", name: "📖 Biblioteca UNILA", type: "link", description: "Acervo" },
  { id: "intercampi", name: "🚌 Intercampi", type: "link", description: "PDF de horários" },
  { id: "smartec", name: "💻 Smart Tech", type: "link", description: "Smart Tech" },
  { id: "editais", name: "📄 Editais Oficiais", type: "link", description: "Documentos" },
  { id: "emergencia", name: "🚨 Emergência", type: "page", description: "Telefones úteis" },
  { id: "enderecos", name: "🏫 Endereços", type: "page", description: "Localização campus" },
  { id: "ru", name: "🍽️ Restaurante Univ.", type: "page", description: "Cardápios" },
  { id: "grupo_facebook", name: "👥 Grupo FB", type: "link", description: "Comunidade" },
  { id: "dev", name: "👨‍💻 Desenvolvedor", type: "page", description: "Contato" },
  { id: "internet", name: "🌐 Internet/Eduroam", type: "page", description: "Configuração" },
  { id: "estude", name: "🎓 Estude na UNILA", type: "page", description: "Ingresso" },
  { id: "enem", name: "📝 ENEM", type: "link", description: "Página Inep" },
  { id: "upa", name: "🏥 UPAs 24h", type: "page", description: "Hospitais" }
];

async function generateSignature(params, secret) {
  try {
    const sortedParams = Object.keys(params).sort().map(key => `${key}=${params[key]}`).join('&');
    const stringToSign = sortedParams + secret;
    if (window.crypto && window.crypto.subtle) {
      const encoder = new TextEncoder();
      const data = encoder.encode(stringToSign);
      const hashBuffer = await window.crypto.subtle.digest('SHA-1', data);
      const hashArray = Array.from(new Uint8Array(hashBuffer));
      return hashArray.map(b => b.toString(16).padStart(2, '0')).join('');
    } else {
      throw new Error("Crypto API não disponível (verifique se está usando HTTPS)");
    }
  } catch (err) {
    console.error("Erro na assinatura:", err);
    throw err;
  }
}

async function uploadPhoto(file, id) {
  if(!file) return;
  if (!file.type.startsWith('image/')) {
    showToast("❌ Por favor, selecione uma imagem válida.", "error");
    return;
  }
  const btn = document.getElementById(`btn_up_${id}`);
  const textarea = document.getElementById(`field_${id}`);
  btn.textContent = "⏳ Enviando...";
  btn.disabled = true;
  try {
    const timestamp = Math.round(new Date().getTime() / 1000);
    const signature = await generateSignature({ timestamp: timestamp }, CLOUDINARY_API_SECRET);
    const formData = new FormData();
    formData.append('file', file);
    formData.append('api_key', CLOUDINARY_API_KEY);
    formData.append('timestamp', timestamp);
    formData.append('signature', signature);
    const response = await fetch(`https://api.cloudinary.com/v1_1/${CLOUDINARY_CLOUD_NAME}/image/upload`, {
      method: 'POST',
      body: formData
    });
    const data = await response.json();
    if (data.secure_url) {
      const imgTag = `<img src="${data.secure_url}" data-public-id="${data.public_id}">\n`;
      textarea.value = imgTag + textarea.value;
      showToast("✅ Imagem enviada!");
      updateGallery(id); // Atualizar a galeria após o upload
    } else {
      throw new Error(data.error ? data.error.message : "Erro no servidor Cloudinary");
    }
  } catch (e) {
    console.error("Erro no upload:", e);
    showToast(`❌ Erro: ${e.message || "Falha na conexão"}`, "error");
  } finally {
    btn.textContent = "📷 Adicionar Foto";
    btn.disabled = false;
    document.getElementById(`file_${id}`).value = "";
  }
}

// Função para extrair imagens do conteúdo e atualizar a galeria
function updateGallery(id) {
  const textarea = document.getElementById(`field_${id}`);
  const gallery = document.getElementById(`gallery_${id}`);
  if (!gallery) return;
  
  const content = textarea.value;
  const imgRegex = /<img[^>]*src="([^"]*)"[^>]*data-public-id="([^"]*)"[^>]*>/g;
  let match;
  let html = '';
  
  while ((match = imgRegex.exec(content)) !== null) {
    const src = match[1];
    const publicId = match[2];
    html += `
      <div class="gallery-item" id="item_${publicId.replace(/\//g, '_')}">
        <img src="${src}" class="gallery-img">
        <button class="btn-del-gallery" onclick="deletePhoto('${id}', '${publicId}')" title="Excluir">×</button>
      </div>
    `;
  }
  
  gallery.innerHTML = html;
}

async function deletePhoto(sectionId, publicId) {
  showConfirmModal(async () => {
    showToast("⏳ Excluindo...");
    try {
      const timestamp = Math.round(new Date().getTime() / 1000);
      const signature = await generateSignature({ 
        public_id: publicId, 
        timestamp: timestamp 
      }, CLOUDINARY_API_SECRET);

      const formData = new FormData();
      formData.append('public_id', publicId);
      formData.append('api_key', CLOUDINARY_API_KEY);
      formData.append('timestamp', timestamp);
      formData.append('signature', signature);

      const response = await fetch(`https://api.cloudinary.com/v1_1/${CLOUDINARY_CLOUD_NAME}/image/destroy`, {
        method: 'POST',
        body: formData
      });

      const data = await response.json();
      
      if (data.result === 'ok' || data.result === 'not found') {
        const textarea = document.getElementById(`field_${sectionId}`);
        const regex = new RegExp(`<img[^>]*data-public-id="${publicId}"[^>]*>`, 'g');
        textarea.value = textarea.value.replace(regex, '').trim();
        
        updateGallery(sectionId);
        showToast("🗑️ Imagem removida!");
        saveField(sectionId);
      } else {
        throw new Error(data.error ? data.error.message : "Erro ao deletar");
      }
    } catch (e) {
      console.error("Erro ao deletar:", e);
      showToast("❌ Erro ao excluir imagem.", "error");
    }
    closeModal();
  });
}

function showConfirmModal(callback) {
  const modal = document.getElementById('confirmModal');
  const btn = document.getElementById('confirmDeleteBtn');
  modal.style.display = 'flex';
  btn.onclick = callback;
}

function closeModal() {
  document.getElementById('confirmModal').style.display = 'none';
}

async function loadData() {
  const area = document.getElementById('sectionsArea');
  area.innerHTML = '<p style="text-align:center; padding:30px; font-size:14px; color:#94a3b8;">Sincronizando dados...</p>';

  let html = '';
  for (const btn of editableButtons) {
    let val = "";
    try {
      const doc = await db.collection('admin_content').doc(btn.id).get();
      if(doc.exists) val = doc.data().value;
    } catch(e) {}

    html += `
      <div class="section">
        <div class="section-header" onclick="this.nextElementSibling.classList.toggle('open')">
          <h3>${btn.name} <span class="badge ${btn.type === 'link' ? 'badge-link' : 'badge-page'}">${btn.type}</span></h3>
          <span>▼</span>
        </div>
        <div class="section-body">
          <p style="font-size:11px; color:#94a3b8; margin-bottom:12px; font-style:italic;">${btn.description}</p>
          
          ${btn.type === 'page' ? `
            <div class="upload-area">
              <input type="file" id="file_${btn.id}" accept="image/*" style="display:none" onchange="uploadPhoto(this.files[0], '${btn.id}')">
              <button class="btn-upload" id="btn_up_${btn.id}" onclick="document.getElementById('file_${btn.id}').click()">📷 Adicionar Foto</button>
              <div id="gallery_${btn.id}" class="image-gallery"></div>
            </div>
          ` : ''}

          <div class="form-group">
            <label>${btn.type === 'link' ? 'Link (URL)' : 'Texto / HTML'}</label>
            ${btn.type === 'link' 
              ? `<input type="url" id="field_${btn.id}" value="${val}" placeholder="https://...">`
              : `<textarea id="field_${btn.id}" placeholder="Escreva o conteúdo..." oninput="updateGallery('${btn.id}')">${val}</textarea>`
            }
          </div>
          <button class="btn-save" onclick="saveField('${btn.id}')">💾 Salvar Alterações</button>
        </div>
      </div>
    `;
  }
  area.innerHTML = html;
  // Inicializar galerias após carregar o HTML
  editableButtons.forEach(btn => {
    if(btn.type === 'page') updateGallery(btn.id);
  });
}

async function saveField(id) {
  const field = document.getElementById(`field_${id}`);
  const val = field.value.trim();
  const btn = event ? (event.target.closest('.btn-save') || event.target) : null;
  const originalText = btn ? btn.textContent : "";
  if (btn && btn.classList.contains('btn-save')) {
    btn.textContent = "⏳ Salvando...";
    btn.disabled = true;
  }
  try {
    await db.collection('admin_content').doc(id).set({
      value: val,
      updatedAt: firebase.firestore.FieldValue.serverTimestamp()
    }, { merge: true });
    showToast("✅ Alterações salvas!");
    if (btn && btn.classList.contains('btn-save')) btn.textContent = "✅ Sucesso!";
  } catch(e) {
    showToast("❌ Erro ao salvar no Firebase.", "error");
    if (btn && btn.classList.contains('btn-save')) btn.textContent = "❌ Erro!";
  } finally {
    if (btn && btn.classList.contains('btn-save')) {
      setTimeout(() => {
        btn.textContent = originalText;
        btn.disabled = false;
      }, 2000);
    }
  }
}

function showToast(msg, type = 'success') {
  const t = document.getElementById('toast');
  t.textContent = msg;
  t.className = `toast show ${type === 'error' ? 'error' : ''}`;
  setTimeout(() => t.className = 'toast', 3000);
}

window.onclick = function(event) {
  const modal = document.getElementById('confirmModal');
  if (event.target == modal) closeModal();
}
</script>
</body>
</html>
