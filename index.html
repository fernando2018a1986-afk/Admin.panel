<style>
* { margin:0; padding:0; box-sizing:border-box; }

body {
  font-family: 'Segoe UI', sans-serif;
  background: #1a1a2e;
  color: #e0e0e0;
  min-height: 100vh;
  padding: 15px;
}

.header {
  text-align: center;
  padding: 25px;
  background: linear-gradient(135deg, #5b21b6, #2563eb);
  border-radius: 12px;
  margin-bottom: 20px;
  box-shadow: 0 8px 30px rgba(91, 33, 182, 0.3);
}

.header h1 { font-size: 24px; margin-bottom: 5px; }
.header p { opacity: 0.8; font-size: 13px; }

.status-bar {
  display: flex;
  align-items: center;
  gap: 8px;
  justify-content: center;
  margin-top: 10px;
  font-size: 12px;
}

.status-dot {
  width: 8px; height: 8px;
  border-radius: 50%;
  background: #22c55e;
  animation: pulse 2s infinite;
}

@keyframes pulse {
  0%,100% { opacity:1; }
  50% { opacity:0.4; }
}

.section {
  background: #16213e;
  border-radius: 12px;
  margin-bottom: 15px;
  overflow: hidden;
  border: 1px solid #1f3460;
}

.section-header {
  display: flex;
  justify-content: space-between;
  align-items: center;
  padding: 15px 20px;
  background: #1f3460;
  cursor: pointer;
  user-select: none;
}

.section-header h3 { font-size: 15px; }
.section-header .arrow { transition: transform 0.3s; }
.section-header.open .arrow { transform: rotate(180deg); }

.section-body {
  padding: 20px;
  display: none;
}

.section-body.open { display: block; }

.form-group {
  margin-bottom: 15px;
}

.form-group label {
  display: block;
  font-size: 13px;
  font-weight: 600;
  color: #94a3b8;
  margin-bottom: 6px;
}

.form-group input,
.form-group textarea {
  width: 100%;
  padding: 12px;
  border: 1px solid #334155;
  border-radius: 8px;
  background: #0f172a;
  color: #e0e0e0;
  font-size: 14px;
  font-family: inherit;
  transition: border-color 0.3s;
}

.form-group input:focus,
.form-group textarea:focus {
  outline: none;
  border-color: #5b21b6;
  box-shadow: 0 0 0 3px rgba(91, 33, 182, 0.2);
}

.form-group textarea {
  min-height: 120px;
  resize: vertical;
  line-height: 1.6;
}

.btn-save {
  width: 100%;
  padding: 12px;
  border: none;
  border-radius: 8px;
  background: linear-gradient(135deg, #22c55e, #16a34a);
  color: white;
  font-size: 14px;
  font-weight: 700;
  cursor: pointer;
  transition: all 0.3s;
}

.btn-save:hover {
  transform: translateY(-2px);
  box-shadow: 0 5px 15px rgba(34, 197, 94, 0.3);
}

.btn-save:active { transform: scale(0.98); }

.btn-save.saving {
  background: #6b7280;
  pointer-events: none;
}

.toast {
  position: fixed;
  bottom: 20px;
  left: 50%;
  transform: translateX(-50%) translateY(100px);
  background: #22c55e;
  color: white;
  padding: 12px 24px;
  border-radius: 8px;
  font-weight: 600;
  font-size: 14px;
  z-index: 9999;
  transition: transform 0.3s ease;
  box-shadow: 0 5px 20px rgba(0,0,0,0.3);
}

.toast.show { transform: translateX(-50%) translateY(0); }
.toast.error { background: #ef4444; }

.badge {
  display: inline-block;
  padding: 3px 8px;
  border-radius: 4px;
  font-size: 11px;
  font-weight: 600;
}

.badge-link { background: #2563eb; }
.badge-page { background: #9333ea; }

.info-box {
  background: #0f172a;
  border-left: 3px solid #5b21b6;
  padding: 12px;
  border-radius: 0 8px 8px 0;
  margin-bottom: 15px;
  font-size: 12px;
  color: #94a3b8;
}

.loading {
  text-align: center;
  padding: 40px;
  color: #94a3b8;
}

.loading-spinner {
  width: 30px; height: 30px;
  border: 3px solid #334155;
  border-top-color: #5b21b6;
  border-radius: 50%;
  animation: spin 0.8s linear infinite;
  margin: 0 auto 10px;
}

@keyframes spin { to { transform: rotate(360deg); } }

// Carregar dados do Firebase
async function loadData() {
  const sectionsArea = document.getElementById('sectionsArea');
  sectionsArea.innerHTML = '';

  for (const btn of editableButtons) {
    // Tentar carregar do Firebase
    let currentValue = btn.defaultValue;
    try {
      const doc = await db.collection('admin_content').doc(btn.id).get();
      if (doc.exists) {
        currentValue = doc.data().value;
      }
    } catch(e) {
      console.log('Usando valor padrão para:', btn.id);
    }

    const section = document.createElement('div');
    section.className = 'section';

    const badgeClass = btn.type === 'link' ? 'badge-link' : 'badge-page';
    const badgeText = btn.type === 'link' ? 'LINK' : 'PÁGINA';
    const inputType = btn.type === 'link' ? 'input' : 'textarea';

    section.innerHTML = `
      <div class="section-header" onclick="toggleSection(this)">
        <h3>${btn.name} <span class="badge ${badgeClass}">${badgeText}</span></h3>
        <span class="arrow">▼</span>
      </div>
      <div class="section-body">
        <div class="info-box">${btn.description}</div>
        <div class="form-group">
          <label>${btn.type === 'link' ? 'URL / Link de destino' : 'Conteúdo da página (texto)'}</label>
          ${btn.type === 'link' 
            ? `<input type="url" id="field_${btn.id}" value="${escapeHtml(currentValue)}" placeholder="https://...">`
            : `<textarea id="field_${btn.id}" placeholder="Digite o conteúdo...">${escapeHtml(currentValue)}</textarea>`
          }
        </div>
        <button class="btn-save" id="btn_${btn.id}" onclick="saveField('${btn.id}')">💾 Salvar</button>
      </div>
    `;

    sectionsArea.appendChild(section);
  }

  document.getElementById('loadingArea').style.display = 'none';
  sectionsArea.style.display = 'block';
}

function escapeHtml(text) {
  const div = document.createElement('div');
  div.textContent = text;
  return div.innerHTML;
}

function toggleSection(header) {
  header.classList.toggle('open');
  const body = header.nextElementSibling;
  body.classList.toggle('open');
}

async function saveField(id) {
  const field = document.getElementById(`field_${id}`);
  const btn = document.getElementById(`btn_${id}`);
  const value = field.value.trim();

  if (!value) {
    showToast('❌ O campo não pode estar vazio!', 'error');
    return;
  }

  btn.textContent = '⏳ Salvando...';
  btn.classList.add('saving');

  try {
    await db.collection('admin_content').doc(id).set({
      value: value,
      updatedAt: firebase.firestore.FieldValue.serverTimestamp()
    });

    btn.textContent = '✅ Salvo!';
    showToast('✅ Conteúdo salvo com sucesso!');

    setTimeout(() => {
      btn.textContent = '💾 Salvar';
      btn.classList.remove('saving');
    }, 2000);

  } catch(e) {
    btn.textContent = '❌ Erro!';
    showToast('❌ Erro ao salvar: ' + e.message, 'error');

    setTimeout(() => {
      btn.textContent = '💾 Salvar';
      btn.classList.remove('saving');
    }, 2000);
  }
}

function showToast(msg, type = 'success') {
  const toast = document.getElementById('toast');
  toast.textContent = msg;
  toast.className = `toast show ${type === 'error' ? 'error' : ''}`;
  setTimeout(() => { toast.className = 'toast'; }, 3000);
}
