<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Admin - UNILA App</title>
<style>
* { margin:0; padding:0; box-sizing:border-box; }

body {
  font-family: 'Segoe UI', sans-serif;
  background: #1a1a2e;
  color: #e0e0e0;
  min-height: 100vh;
  padding: 15px;
}

.header {
  text-align: center;
  padding: 25px;
  background: linear-gradient(135deg, #5b21b6, #2563eb);
  border-radius: 12px;
  margin-bottom: 20px;
  box-shadow: 0 8px 30px rgba(91, 33, 182, 0.3);
}

.header h1 { font-size: 24px; margin-bottom: 5px; }
.header p { opacity: 0.8; font-size: 13px; }

.status-bar {
  display: flex;
  align-items: center;
  gap: 8px;
  justify-content: center;
  margin-top: 10px;
  font-size: 12px;
}

.status-dot {
  width: 8px; height: 8px;
  border-radius: 50%;
  background: #22c55e;
  animation: pulse 2s infinite;
}

.status-dot.disconnected {
  background: #ef4444;
  animation: none;
}

@keyframes pulse {
  0%,100% { opacity:1; }
  50% { opacity:0.4; }
}

.section {
  background: #16213e;
  border-radius: 12px;
  margin-bottom: 15px;
  overflow: hidden;
  border: 1px solid #1f3460;
}

.section-header {
  display: flex;
  justify-content: space-between;
  align-items: center;
  padding: 15px 20px;
  background: #1f3460;
  cursor: pointer;
  user-select: none;
}

.section-header h3 { font-size: 15px; }
.section-header .arrow { transition: transform 0.3s; }
.section-header.open .arrow { transform: rotate(180deg); }

.section-body {
  padding: 20px;
  display: none;
}

.section-body.open { display: block; }

.form-group {
  margin-bottom: 15px;
}

.form-group label {
  display: block;
  font-size: 13px;
  font-weight: 600;
  color: #94a3b8;
  margin-bottom: 6px;
}

.form-group input,
.form-group textarea {
  width: 100%;
  padding: 12px;
  border: 1px solid #334155;
  border-radius: 8px;
  background: #0f172a;
  color: #e0e0e0;
  font-size: 14px;
  font-family: inherit;
  transition: border-color 0.3s;
}

.form-group input:focus,
.form-group textarea:focus {
  outline: none;
  border-color: #5b21b6;
  box-shadow: 0 0 0 3px rgba(91, 33, 182, 0.2);
}

.form-group textarea {
  min-height: 120px;
  resize: vertical;
  line-height: 1.6;
}

.upload-area {
  background: rgba(255,255,255,0.05);
  border: 2px dashed #334155;
  border-radius: 8px;
  padding: 15px;
  text-align: center;
  margin-bottom: 15px;
}

.upload-area p {
  font-size: 12px;
  color: #94a3b8;
  margin-bottom: 10px;
}

.btn-upload {
  background: #3b82f6;
  color: white;
  border: none;
  padding: 8px 15px;
  border-radius: 6px;
  font-size: 12px;
  font-weight: 600;
  cursor: pointer;
}

.img-preview {
  max-width: 100%;
  max-height: 150px;
  border-radius: 8px;
  margin-top: 10px;
  display: none;
}

.btn-save {
  width: 100%;
  padding: 12px;
  border: none;
  border-radius: 8px;
  background: linear-gradient(135deg, #22c55e, #16a34a);
  color: white;
  font-size: 14px;
  font-weight: 700;
  cursor: pointer;
  transition: all 0.3s;
}

.btn-save:hover {
  transform: translateY(-2px);
  box-shadow: 0 5px 15px rgba(34, 197, 94, 0.3);
}

.btn-save.saving {
  background: #6b7280;
  pointer-events: none;
}

.toast {
  position: fixed;
  bottom: 20px;
  left: 50%;
  transform: translateX(-50%) translateY(100px);
  background: #22c55e;
  color: white;
  padding: 12px 24px;
  border-radius: 8px;
  font-weight: 600;
  font-size: 14px;
  z-index: 9999;
  transition: transform 0.3s ease;
  box-shadow: 0 5px 20px rgba(0,0,0,0.3);
}

.toast.show { transform: translateX(-50%) translateY(0); }
.toast.error { background: #ef4444; }

.badge {
  display: inline-block;
  padding: 3px 8px;
  border-radius: 4px;
  font-size: 11px;
  font-weight: 600;
}

.badge-link { background: #2563eb; }
.badge-page { background: #9333ea; }

.info-box {
  background: #0f172a;
  border-left: 3px solid #5b21b6;
  padding: 12px;
  border-radius: 0 8px 8px 0;
  margin-bottom: 15px;
  font-size: 12px;
  color: #94a3b8;
}

.loading {
  text-align: center;
  padding: 40px;
  color: #94a3b8;
}

.loading-spinner {
  width: 30px; height: 30px;
  border: 3px solid #334155;
  border-top-color: #5b21b6;
  border-radius: 50%;
  animation: spin 0.8s linear infinite;
  margin: 0 auto 10px;
}

@keyframes spin { to { transform: rotate(360deg); } }
</style>

<script src="https://www.gstatic.com/firebasejs/10.12.2/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.12.2/firebase-firestore-compat.js"></script>
</head>
<body>

<div class="header">
  <h1>🎛️ Admin Panel</h1>
  <p>Edite os conteúdos dos botões do UNILA App</p>
  <div class="status-bar">
    <div id="statusDot" class="status-dot"></div>
    <span id="statusText">Conectando ao Firebase...</span>
  </div>
</div>

<div id="errorBox" class="error-box" style="display:none; background: #7f1d1d; border: 1px solid #dc2626; color: #fecaca; padding: 15px; border-radius: 8px; margin-bottom: 20px;"></div>

<div id="loadingArea" class="loading">
  <div class="loading-spinner"></div>
  <p>Carregando conteúdos...</p>
</div>

<div id="sectionsArea" style="display:none;"></div>

<div id="toast" class="toast"></div>

<script>
// Firebase Config
const firebaseConfig = {
  apiKey: "AIzaSyDCm8jh-gz3T8OkOH2J6ls66t5QizcKwu8",
  authDomain: "app-unila.firebaseapp.com",
  projectId: "app-unila",
  storageBucket: "app-unila.firebasestorage.app",
  messagingSenderId: "574505875323",
  appId: "1:574505875323:web:fb885f0a2ae32b272fafde",
  measurementId: "G-FJT3X93608"
};

firebase.initializeApp(firebaseConfig);
const db = firebase.firestore();

// Credenciais Cloudinary
const CLOUDINARY_CLOUD_NAME = 'dthnn5flq';
const CLOUDINARY_API_KEY = '444299785184934';
const CLOUDINARY_API_SECRET = '3dNWqkn-MH4p3wF75K_vgb1opVs';

let firebaseConnected = false;

const editableButtons = [
  { id: "noticias", name: "📰 Notícias", type: "page", description: "Texto de notícias do app", defaultValue: "" },
  { id: "portal_unila", name: "🌐 Portal Oficial da UNILA", type: "link", description: "Link do portal oficial", defaultValue: "https://portal.unila.edu.br/" },
  { id: "sigaa", name: "📚 Sistema Acadêmico SIGAA", type: "link", description: "Link do sistema SIGAA", defaultValue: "https://sig.unila.edu.br/sigaa/verTelaLogin.do" },
  { id: "email", name: "📧 E-mail Institucional", type: "link", description: "Link do e-mail institucional", defaultValue: "https://mail.google.com/" },
  { id: "google", name: "🔎 Pesquisa Google", type: "link", description: "Link do Google", defaultValue: "https://www.google.com/" },
  { id: "instagram", name: "📸 Instagram UNILA", type: "link", description: "Link do Instagram", defaultValue: "https://www.instagram.com/instaunila/" },
  { id: "facebook", name: "📘 Facebook UNILA", type: "link", description: "Link do Facebook", defaultValue: "https://www.facebook.com/unila.oficial" },
  { id: "biblioteca", name: "📖 Biblioteca UNILA", type: "link", description: "Link da biblioteca", defaultValue: "https://portal.unila.edu.br/biblioteca" },
  { id: "intercampi", name: "🚌 Transporte Intercampi", type: "link", description: "Link do PDF de horários", defaultValue: "https://portal.unila.edu.br/proagi/delog/arquivos/horario-intercampi/quadro-de-horario-intercampi.pdf" },
  { id: "smartec", name: "💻 Smart Tech", type: "link", description: "Link da página Smart Tech", defaultValue: "https://www.facebook.com/profile.php?id=61562436416014" },
  { id: "editais", name: "📄 Editais Oficiais", type: "link", description: "Link dos editais", defaultValue: "https://documentos.unila.edu.br/" },
  { id: "emergencia", name: "🚨 Telefones de Emergência", type: "page", description: "Texto com telefones de emergência", defaultValue: "" },
  { id: "enderecos", name: "🏫 Endereços dos Campus", type: "page", description: "Texto com endereços dos campus", defaultValue: "" },
  { id: "ru", name: "🍽️ Restaurantes Universitários", type: "page", description: "Informações sobre o RU", defaultValue: "" },
  { id: "grupo_facebook", name: "👥 Grupo no Facebook", type: "link", description: "Link do grupo no Facebook", defaultValue: "https://facebook.com/groups/1469303078173697/" },
  { id: "dev", name: "👨‍💻 Desenvolvedor", type: "page", description: "Informações do desenvolvedor", defaultValue: "" },
  { id: "internet", name: "🌐 Internet UNILA", type: "page", description: "Instruções de configuração da internet", defaultValue: "" },
  { id: "estude", name: "🎓 Estude na UNILA", type: "page", description: "Informações sobre estudar na UNILA", defaultValue: "" },
  { id: "enem", name: "📝 ENEM – Página do Participante", type: "link", description: "Link do ENEM", defaultValue: "https://enem.inep.gov.br/participante/#!/" },
  { id: "upa", name: "🏥 Hospitais de Emergência 24h (UPA)", type: "page", description: "Informações sobre UPAs", defaultValue: "" }
];

async function checkFirebaseConnection() {
  try {
    await db.collection('admin_content').limit(1).get();
    firebaseConnected = true;
    updateStatusBar(true);
    return true;
  } catch(e) {
    firebaseConnected = false;
    updateStatusBar(false);
    return false;
  }
}

function updateStatusBar(connected) {
  const dot = document.getElementById('statusDot');
  const text = document.getElementById('statusText');
  dot.className = connected ? 'status-dot' : 'status-dot disconnected';
  text.textContent = connected ? '✅ Conectado ao Firebase' : '❌ Desconectado do Firebase';
}

async function generateSignature(params, secret) {
  const sortedParams = Object.keys(params).sort().map(key => `${key}=${params[key]}`).join('&');
  const stringToSign = sortedParams + secret;
  const encoder = new TextEncoder();
  const data = encoder.encode(stringToSign);
  const hashBuffer = await crypto.subtle.digest('SHA-1', data);
  const hashArray = Array.from(new Uint8Array(hashBuffer));
  return hashArray.map(b => b.toString(16).padStart(2, '0')).join('');
}

async function uploadToCloudinary(file, id) {
  const btn = document.getElementById(`btn_upload_${id}`);
  const preview = document.getElementById(`preview_${id}`);
  const textarea = document.getElementById(`field_${id}`);
  
  const originalText = btn.textContent;
  btn.textContent = '⏳ Enviando...';
  btn.disabled = true;

  const timestamp = Math.round(new Date().getTime() / 1000);
  const signature = await generateSignature({ timestamp: timestamp }, CLOUDINARY_API_SECRET);

  const formData = new FormData();
  formData.append('file', file);
  formData.append('api_key', CLOUDINARY_API_KEY);
  formData.append('timestamp', timestamp);
  formData.append('signature', signature);

  try {
    const response = await fetch(`https://api.cloudinary.com/v1_1/${CLOUDINARY_CLOUD_NAME}/image/upload`, {
      method: 'POST',
      body: formData,
    });
    const data = await response.json();
    if (data.secure_url) {
      const imgHtml = `<img src="${data.secure_url}">\n`;
      textarea.value = imgHtml + textarea.value;
      preview.src = data.secure_url;
      preview.style.display = 'block';
      showToast('✅ Imagem enviada e adicionada ao texto!');
    } else {
      showToast('❌ Erro no Cloudinary', 'error');
    }
  } catch (error) {
    showToast('❌ Erro na conexão', 'error');
  } finally {
    btn.textContent = originalText;
    btn.disabled = false;
  }
}

async function loadData() {
  const connected = await checkFirebaseConnection();
  if (!connected) {
    document.getElementById('loadingArea').innerHTML = '<p>❌ Erro ao conectar ao Firebase.</p>';
    return;
  }

  const sectionsArea = document.getElementById('sectionsArea');
  sectionsArea.innerHTML = '';

  for (const btn of editableButtons) {
    let currentValue = btn.defaultValue;
    try {
      const doc = await db.collection('admin_content').doc(btn.id).get();
      if (doc.exists) currentValue = doc.data().value;
    } catch(e) {}

    const section = document.createElement('div');
    section.className = 'section';
    const badgeClass = btn.type === 'link' ? 'badge-link' : 'badge-page';
    const badgeText = btn.type === 'link' ? 'LINK' : 'PÁGINA';

    section.innerHTML = `
      <div class="section-header" onclick="toggleSection(this)">
        <h3>${btn.name} <span class="badge ${badgeClass}">${badgeText}</span></h3>
        <span class="arrow">▼</span>
      </div>
      <div class="section-body">
        <div class="info-box">${btn.description}</div>
        
        ${btn.type === 'page' ? `
          <div class="upload-area">
            <p>🖼️ Adicionar imagem nesta página:</p>
            <input type="file" id="file_${btn.id}" accept="image/*" style="display:none" onchange="uploadToCloudinary(this.files[0], '${btn.id}')">
            <button class="btn-upload" id="btn_upload_${btn.id}" onclick="document.getElementById('file_${btn.id}').click()">📷 Selecionar e Enviar Foto</button>
            <img id="preview_${btn.id}" class="img-preview">
          </div>
        ` : ''}

        <div class="form-group">
          <label>${btn.type === 'link' ? 'URL de destino' : 'Conteúdo (Texto ou HTML)'}</label>
          ${btn.type === 'link' 
            ? `<input type="url" id="field_${btn.id}" value="${currentValue}">`
            : `<textarea id="field_${btn.id}">${currentValue}</textarea>`
          }
        </div>
        <button class="btn-save" id="btn_${btn.id}" onclick="saveField('${btn.id}')">💾 Salvar Alterações</button>
      </div>
    `;
    sectionsArea.appendChild(section);
  }

  document.getElementById('loadingArea').style.display = 'none';
  sectionsArea.style.display = 'block';
}

async function saveField(id) {
  const value = document.getElementById(`field_${id}`).value.trim();
  const btn = document.getElementById(`btn_${id}`);
  
  btn.textContent = '⏳ Salvando...';
  btn.classList.add('saving');

  try {
    await db.collection('admin_content').doc(id).set({
      value: value,
      updatedAt: firebase.firestore.FieldValue.serverTimestamp()
    }, { merge: true });
    showToast('✅ Salvo com sucesso!');
    btn.textContent = '✅ Salvo!';
  } catch(e) {
    showToast('❌ Erro ao salvar', 'error');
    btn.textContent = '❌ Erro!';
  } finally {
    setTimeout(() => {
      btn.textContent = '💾 Salvar Alterações';
      btn.classList.remove('saving');
    }, 2000);
  }
}

function toggleSection(header) {
  header.classList.toggle('open');
  header.nextElementSibling.classList.toggle('open');
}

function showToast(msg, type = 'success') {
  const toast = document.getElementById('toast');
  toast.textContent = msg;
  toast.className = `toast show ${type === 'error' ? 'error' : ''}`;
  setTimeout(() => { toast.className = 'toast'; }, 3000);
}

loadData();
</script>
</body>
</html>
